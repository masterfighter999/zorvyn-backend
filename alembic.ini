# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# sys.path to prepend (project root)
prepend_sys_path = .

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# Interpret database URL from env at runtime (see env.py)
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
